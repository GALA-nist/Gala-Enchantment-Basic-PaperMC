name: GalaEnchantmentBasic
version: '${version}'
main: com.gala.geb.GEBPlugin
api-version: '26.1'
description: Create custom effect enchantments for tools, weapons and armor through an in-game GUI.
author: Gala

commands:
  geb:
    description: Gala Enchantment Basic main command
    usage: /geb <create|remove|reload|give|list>
    aliases: [gbe, gba, galaenchant]
    permission: geb.admin

permissions:
  geb.admin:
    description: Access to all GEB commands (operators only by default)
    default: op
