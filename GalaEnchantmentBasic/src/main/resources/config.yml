# ============================================
#  Gala Enchantment Basic - configuration
# ============================================

# Highest level an admin can pick in the level selector (I .. XI by default).
max-level: 11

# ---------- Effect blacklist ----------
blacklist:
  # These vanilla effect keys can NEVER be used, no matter the item.
  # (instant health = abusable perma-heal, levitation = "shulker flying",
  #  saturation = free food, etc.)
  global:
    - instant_health
    - instant_damage
    - levitation
    - saturation
    - health_boost
    - absorption
    - bad_omen
    - raid_omen
    - trial_omen
    - hero_of_the_village
    - wind_charged
    - weaving
    - oozing
    - infested

  # Armor and tools apply their effect to the WEARER/HOLDER,
  # so harmful (negative) effects are blocked for them.
  block-harmful-on-armor-and-tools: true

  # Weapons allow BOTH kinds of effects:
  #  - debuffs (Poison, Slowness, Weakness...) are applied to the TARGET you hit
  #  - buffs (Regeneration, Speed...) are applied to YOU when you hit

# ---------- Enchanting table integration ----------
enchant-table:
  # When a player enchants a valid item at an enchanting table,
  # this is the chance (0.0 - 1.0) that a random matching GEB
  # enchantment is added on top of the vanilla ones.
  enabled: true
  chance: 0.20
  # XP levels required per enchant tier: tier III needs 3 x this many levels.
  levels-per-tier: 8

# ---------- Effect refresh ----------
# How often (in ticks) worn armor / held tool effects are re-applied. 20 ticks = 1s.
effect-refresh-ticks: 40
