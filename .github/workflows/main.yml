name: Build GalaEnchantmentBasic

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin jar
        run: |
          if [ -f build.gradle ]; then
            gradle build --no-daemon
          else
            cd GalaEnchantmentBasic && gradle build --no-daemon
          fi

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: GalaEnchantmentBasic-jar
          path: '**/build/libs/*.jar'
